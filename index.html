nsfer of the day","type":"auto","criteria":{"source":"scores","field":"total","filter":{"outcome_regex":"sale|sold|bound","callType":"transfer"},"aggregate":"count","operator":">=","value":1,"window":{"type":"all_time"}}},{"position":18,"label":"Self-generated referral quote","type":"claim","claim":{"requiresNote":true,"notePlaceholder":"Customer name for the referral quote","verifyMethod":"customer_match","matchSources":["scores"],"matchFilter":{"outcome_regex":"quote|sale|sold|bound"}}},{"position":19,"label":"Sell to someone who wasn't the original lead","type":"claim","claim":{"requiresNote":true,"notePlaceholder":"Customer name (the non-original lead you sold to)","verifyMethod":"ai_verify"}},{"position":20,"label":"Close a policy over $200/mo premium","type":"claim","claim":{"requiresNote":true,"notePlaceholder":"Customer name for the $200+ policy","verifyMethod":"customer_match","matchSources":["az_sales"],"matchFilter":{"min_premium":200}}},{"position":21,"label":"Hit 100% of daily goal","type":"auto","criteria":{"source":"perf_report","field":"goal_pct","filter":{"min_goal_pct":100},"aggregate":"count","operator":">=","value":1,"window":{"type":"all_time"}}},{"position":22,"label":"Re-quote and close a lost lead","type":"claim","claim":{"requiresNote":true,"notePlaceholder":"Customer name for the re-quoted lead","verifyMethod":"ai_verify"}},{"position":23,"label":"Score 21+ on an evaluation","type":"auto","criteria":{"source":"scores","field":"total","filter":{"min_total":21},"aggregate":"count","operator":">=","value":1,"window":{"type":"all_time"}}},{"position":24,"label":"Get 3+ closes in a single day","type":"auto","criteria":{"source":"perf_report","field":"closes","filter":{},"aggregate":"max_per_day","operator":">=","value":3,"window":{"type":"all_time"}}}],"winner":null},"agents":[{"name":"Hailey Walker","marked":{"12":{"status":"free","note":null},"17":{"status":"verified","note":null},"21":{"status":"flagged","note":null},"23":{"status":"flagged","note":null}},"total":2,"bingo":null,"closest":2},{"name":"Alez Felix","marked":{"12":{"status":"free","note":null}},"total":1,"bingo":null,"closest":1},{"name":"Jonathan Sanchez","marked":{"12":{"status":"free","note":null}},"total":1,"bingo":null,"closest":1}],"generatedAt":"2026-03-10T22:53:56.002Z"};
const SERVER = 'https://zero-administration-eastern-combining.trycloudflare.com';
const META = {
  0:{e:'\u{1F3AF}',d:'hard'},1:{e:'\u{1F3E0}',d:'medium'},2:{e:'\u{1F4C7}',d:'easy'},
  3:{e:'\u{26A1}',d:'hard'},4:{e:'\u{1F525}',d:'medium'},5:{e:'\u{1F697}',d:'medium'},
  6:{e:'\u{2B50}',d:'hard'},7:{e:'\u{1F305}',d:'medium'},8:{e:'\u{1F511}',d:'easy'},
  9:{e:'\u{1F4C5}',d:'medium'},10:{e:'\u{1F3C1}',d:'easy'},11:{e:'\u{23F1}',d:'easy'},
  12:{e:'\u{1F396}',d:'free'},13:{e:'\u{2602}',d:'hard'},14:{e:'\u{1F4DE}',d:'medium'},
  15:{e:'\u{1F4C8}',d:'medium'},16:{e:'\u{1F4F1}',d:'easy'},17:{e:'\u{1F91D}',d:'medium'},
  18:{e:'\u{1F4A1}',d:'medium'},19:{e:'\u{1F465}',d:'hard'},20:{e:'\u{1F4B0}',d:'hard'},
  21:{e:'\u{1F3AF}',d:'medium'},22:{e:'\u{1F504}',d:'hard'},23:{e:'\u{1F4CA}',d:'easy'},
  24:{e:'\u{1F3C6}',d:'hard'},
};
const DCOL = {easy:'#22c55e',medium:'#eab308',hard:'#ef4444',free:'#a78bfa'};
let currentAgent = DATA.agents?.[0]?.name || null;
let pendingPos = null;
let serverOnline = null;

// ── Queue (localStorage) ──────────────────────────
const Q_KEY = 'bingo_claim_queue';
function getQueue() { try { return JSON.parse(localStorage.getItem(Q_KEY) || '[]'); } catch { return []; } }
function saveQueue(q) { localStorage.setItem(Q_KEY, JSON.stringify(q)); }
function addToQueue(agent, position, note) {
  const q = getQueue();
  if (q.some(c => c.agent === agent && c.position === position)) return;
  q.push({ agent, position, note, ts: Date.now() });
  saveQueue(q);
}
function removeFromQueue(agent, position) {
  saveQueue(getQueue().filter(c => !(c.agent === agent && c.position === position)));
}
function isQueued(agent, position) {
  return getQueue().some(c => c.agent === agent && c.position === position);
}

// ── Server communication ──────────────────────────
async function sendClaim(agent, position, note) {
  const resp = await fetch(SERVER + '/teams/bingo/mark', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ agent, position, note: note || undefined }),
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'Server error');
  return data;
}

async function checkServer() {
  try {
    const c = new AbortController();
    const t = setTimeout(() => c.abort(), 4000);
    const r = await fetch(SERVER + '/teams/bingo/board?agent=' + encodeURIComponent(currentAgent || ''), { signal: c.signal });
    clearTimeout(t);
    serverOnline = r.ok;
  } catch { serverOnline = false; }
  render();
}

async function flushQueue() {
  const q = getQueue();
  if (!q.length) return;
  let flushed = 0;
  for (const claim of [...q]) {
    try {
      await sendClaim(claim.agent, claim.position, claim.note);
      removeFromQueue(claim.agent, claim.position);
      flushed++;
    } catch {}
  }
  if (flushed) { toast(flushed + ' queued claim(s) sent to server!', 'ok'); render(); }
}

// ── Claim flow ────────────────────────────────────
function clickCell(position) {
  if (!currentAgent || !DATA.board) return;
  const sq = DATA.board.squares.find(s => s.position === position);
  if (!sq || sq.type === 'free') return;
  const agent = DATA.agents.find(a => a.name === currentAgent);
  const mark = agent?.marked?.[String(position)];
  if (mark || isQueued(currentAgent, position)) return;

  // Check if note is required
  if (sq.claim?.requiresNote || sq.type === 'claim') {
    pendingPos = position;
    document.getElementById('modal-title').textContent = sq.label || 'Claim Square';
    document.getElementById('modal-desc').textContent = sq.claim?.notePlaceholder || 'Provide details so we can verify your claim.';
    document.getElementById('note-input').placeholder = sq.claim?.notePlaceholder || 'Customer name or details...';
    document.getElementById('note-input').value = '';
    document.getElementById('note-modal').classList.add('active');
    setTimeout(() => document.getElementById('note-input').focus(), 100);
  } else {
    submitClaimDirect(position, null);
  }
}

function closeModal() {
  document.getElementById('note-modal').classList.remove('active');
  pendingPos = null;
}

async function submitClaim() {
  if (pendingPos === null) return;
  const note = document.getElementById('note-input').value.trim();
  if (!note) { toast('Note is required', 'err'); return; }
  const pos = pendingPos;
  closeModal();
  await submitClaimDirect(pos, note);
}

async function submitClaimDirect(position, note) {
  // Try server first
  try {
    await sendClaim(currentAgent, position, note);
    toast('Claim submitted! Awaiting verification.', 'ok');
    serverOnline = true;
    // Mark locally as pending so UI updates immediately
    const agent = DATA.agents.find(a => a.name === currentAgent);
    if (agent) { agent.marked[String(position)] = { status: 'pending', note }; }
    render();
    return;
  } catch (err) {
    // Server unreachable — queue it
    addToQueue(currentAgent, position, note);
    toast('Server offline — claim saved. Will send when server is back.', 'info');
    serverOnline = false;
    render();
  }
}

// ── Toast ─────────────────────────────────────────
function toast(msg, type) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'info');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Render ────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function render() {
  if (!DATA.board || !DATA.agents?.length) {
    document.getElementById('app').innerHTML = '<div class="empty"><div class="icon">\u{1F3B2}</div><p>No active bingo board.</p></div>';
    return;
  }
  const board = DATA.board;
  const agent = DATA.agents.find(a => a.name === currentAgent) || DATA.agents[0];
  const marked = agent.marked || {};
  const total = agent.total || 0;
  const hasBingo = agent.bingo;
  const pct = Math.round((total / 25) * 100);
  const queue = getQueue();
  const queuedForAgent = queue.filter(c => c.agent === currentAgent);

  const dotColor = serverOnline === true ? '#22c55e' : serverOnline === false ? '#ef4444' : '#64748b';
  const dotTitle = serverOnline === true ? 'Server online' : serverOnline === false ? 'Server offline — claims will queue' : 'Checking server...';

  let h = '<div class="header"><div class="header-inner">' +
    '<h1><span class="server-dot" style="background:' + dotColor + ';" title="' + dotTitle + '"></span> ' + esc(board.name || 'Road to 25') + '</h1>' +
    '<div style="display:flex;gap:8px;align-items:center;">' +
    '<select class="agent-select" onchange="switchAgent(this.value)">';
  for (const a of DATA.agents) {
    h += '<option value="' + esc(a.name) + '"' + (a.name===currentAgent?' selected':'') + '>' + esc(a.name) + ' (' + a.total + '/25)</option>';
  }
  h += '</select><span class="score-badge">' + total + ' / 25</span></div></div></div>';

  if (hasBingo) h += '<div class="bingo-banner">\u{1F389} ' + esc(agent.name) + ' — BINGO! \u{1F389}</div>';
  if (board.winner && board.winner.agent !== agent.name) {
    h += '<div class="bingo-banner" style="background:linear-gradient(135deg,#6366f1,#4f46e5);font-size:14px;">\u{1F3C6} ' + esc(board.winner.agent) + ' got BINGO first!</div>';

  if (queuedForAgent.length) {
    h += '<div style="background:rgba(249,115,22,0.1);border:1px solid #f97316;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#f97316;">' +
      '\u{1F4E4} ' + queuedForAgent.length + ' claim(s) queued — will send when server comes online</div>';
  }

  h += '<div class="player-bar"><span class="player-name">Playing as: <strong>' + esc(agent.name) + '</strong></span>' +
    '<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:11px;color:#64748b;">' + pct + '%</span>' +
    '<div class="progress-wrap"><div class="progress-fill" style="width:' + pct + '%;background:' + (hasBingo?'#22c55e':'#6366f1') + ';"></div></div></div></div>';

  for (let i = 0; i < 25; i++) {
    const sq = board.squares.find(s => s.position === i);

    let cls = 'cell';

    h += '<div class="' + cls + '"' + click + ' title="' + esc(sq?.label||'') + '">' + icon + dot + '<span class="cell-emoji">' + m.e + '</span><span class="cell-label">' + esc(sq?.label||'') + '</span></div>';
  }
  h += '</div>';

  h += '<div class="legend"><span class="legend-title">Difficulty:</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Easy</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#eab308"></span> Medium</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Hard</span></div>' +
    '<div class="legend" style="margin-top:6px;"><span class="legend-title">Status:</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#6366f1"></span> Tap to claim</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#f97316"></span> Queued</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#eab308"></span> Pending</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Verified</span></div>';

  h += '<div class="leaderboard"><div class="lb-header">\u{1F3C6} Leaderboard</div>';
  const sorted = [...DATA.agents].sort((a, b) => {
    if (a.bingo && !b.bingo) return -1;
    if (!a.bingo && b.bingo) return 1;
    return b.total - a.total;
  });
  sorted.forEach((a, idx) => {
    const medal = idx===0?'\u{1F947}':idx===1?'\u{1F948}':idx===2?'\u{1F949}':(idx+1);
    const active = a.name===currentAgent ? 'font-weight:700;color:#fff;' : '';
    h += '<div class="lb-row" style="' + active + '"><span class="lb-rank">' + medal + '</span><span class="lb-name">' + esc(a.name) + '</span>' +
      (a.bingo ? '<span class="lb-bingo">BINGO!</span>' : '') +
      '<span class="lb-score">' + a.total + '/25</span></div>';
  });
  h += '</div>';
  h += '<div class="updated">Last updated: Mar 10, 3:53 PM</div>';

  document.getElementById('app').innerHTML = h;
  if (hasBingo && !document.getElementById('confetti')) launchConfetti();
}

function switchAgent(name) { currentAgent = name; render(); }

function launchConfetti() {
  const c = document.createElement('canvas');
  c.id = 'confetti'; document.body.appendChild(c);
  c.width = window.innerWidth; c.height = window.innerHeight;
  const ctx = c.getContext('2d');
  const colors = ['#6366f1','#8b5cf6','#22c55e','#eab308','#ef4444','#ec4899','#06b6d4'];
  const p = Array.from({length:120}, () => ({
    x:Math.random()*c.width, y:Math.random()*c.height-c.height,
    w:Math.random()*8+3, h:Math.random()*5+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    vy:Math.random()*3+1.5, vx:Math.random()*2-1,
    rot:Math.random()*Math.PI*2, vr:(Math.random()-0.5)*0.1, opacity:1,
  }));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height); let alive=0;
    for(const i of p){i.y+=i.vy;i.x+=i.vx;i.rot+=i.vr;
      if(f>100)i.opacity=Math.max(0,i.opacity-0.012);
      if(i.opacity<=0||i.y>c.height+20)continue; alive++;
      ctx.save();ctx.translate(i.x,i.y);ctx.rotate(i.rot);
      ctx.globalAlpha=i.opacity;ctx.fillStyle=i.color;
      ctx.fillRect(-i.w/2,-i.h/2,i.w,i.h);ctx.restore();}
    f++; if(alive>0)requestAnimationFrame(draw);else c.remove();
  })();
}

// ── Init ──────────────────────────────────────────
checkServer();
setInterval(() => { checkServer(); flushQueue(); }, 30000);
render();
</script>
